<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system; }
        .grid { display: grid; grid-template-columns: repeat(52, 1fr); gap: 4px; width: 90vw; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .past { background: #ffffff; opacity: 0.8; }
        .future { background: #222222; }
        .today { background: #FF3B30; box-shadow: 0 0 10px #FF3B30; }
    </style>
</head>
<body>
    <div class="grid" id="calendar"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lived = parseInt(urlParams.get('weeks')) || 0;
        const total = 4680; // 90 years
        const container = document.getElementById('calendar');

        for (let i = 0; i < total; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i < lived) dot.classList.add('past');
            else if (i === lived) dot.classList.add('today');
            else dot.classList.add('future');
            container.appendChild(dot);
        }
    </script>
</body>
</html>
